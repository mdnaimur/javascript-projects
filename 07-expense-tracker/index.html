<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="header">
        <h1>💰 Expense Tracker</h1>
        <div class="header-actions">
            <button class="btn-sm" onclick="exportCSV()">Export CSV</button>
            <button class="btn-sm btn-danger" onclick="clearAll()">Clear All</button>
            <button class="btn btn-sm" onclick="darkMood()"> <span id="dark_light">Dark mode</span>
            </button>
        </div>

    </div>
    </div>

    <div class="app">
        <!-- Summary -->
        <div class="summary">
            <div class="summary-card">
                <div class="summary-label">Total Spent</div>
                <div class="summary-value" id="totalSpent">$0</div>
                <div class="summary-sub" id="totalCount">0 expenses</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">This Month</div>
                <div class="summary-value" id="monthSpent">$0</div>
                <div class="summary-sub" id="monthCount">0 this month</div>
            </div>
            <div class="summary-card">
                <div class="summary-label">Largest Expense</div>
                <div class="summary-value" id="largestAmt">$0</div>
                <div class="summary-sub" id="largestDesc">—</div>
            </div>
        </div>

        <!-- Category breakdown -->
        <div class="breakdown">
            <div class="breakdown-title">Spending by Category</div>
            <div id="breakdown"></div>
        </div>

        <!-- Add form -->
        <div class="form-card">
            <h2>Add Expense</h2>
            <div class="form-row">
                <div class="field">
                    <label>Description</label>
                    <input type="text" id="desc" placeholder="e.g. Lunch at cafe" maxlength="60" />
                </div>
                <div class="field">
                    <label>Amount ($)</label>
                    <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
                </div>
                <div class="field">
                    <label>Category</label>
                    <select id="category">
                        <option value="food">🍔 Food</option>
                        <option value="transport">🚗 Transport</option>
                        <option value="shopping">🛍 Shopping</option>
                        <option value="bills">📋 Bills</option>
                        <option value="health">💊 Health</option>
                        <option value="entertainment">🎮 Entertainment</option>
                        <option value="other">📦 Other</option>
                    </select>
                </div>
                <div class="field">
                    <label>Date</label>
                    <input type="date" id="date" />
                </div>
                <button class="btn btn-primary" onclick="addExpense()">Add</button>
            </div>
        </div>

        <!-- Expense list -->
        <div class="list-header">
            <h2>Transactions</h2>
            <div class="list-controls">
                <select id="filterCat" onchange="render()">
                    <option value="">All categories</option>
                    <option value="food">Food</option>
                    <option value="transport">Transport</option>
                    <option value="shopping">Shopping</option>
                    <option value="bills">Bills</option>
                    <option value="health">Health</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="other">Other</option>
                </select>
                <select id="sortExp" onchange="render()">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="highest">Highest</option>
                    <option value="lowest">Lowest</option>
                </select>
            </div>
        </div>
        <div class="expense-list" id="expenseList"></div>

    </div>

    <script type="module" src="./js/app.js"></script>

</body>

</html>
