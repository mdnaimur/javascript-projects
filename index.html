    <title>Projects Showcase</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #fff;
        }

        header {
            padding: 40px;
            text-align: center;
            background: #111827;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        header p {
            color: #94a3b8;
        }

        .container {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px;
            transition: 0.2s;
            border: 1px solid #334155;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #38bdf8;
        }

        .card h3 {
            margin-top: 0;
        }

        .tags {
            font-size: 12px;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        a {
            text-decoration: none;
            color: white;
        }

        .btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            font-size: 14px;
            background: #2563eb;
            transition: 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .github {
            background: #334155;
        }

        .github:hover {
            background: #475569;
        }
    </style>
</head>
